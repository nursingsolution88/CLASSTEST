<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nursing Solution Test</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body oncontextmenu="return false">

<div class="top-bar">

<h3>Nursing Solution Test Series</h3>

<div id="timer">60:00</div>

</div>

<div class="container">

<div id="questionBox">

<h2 id="question">Question Loading...</h2>

<div class="options">

<label><input type="radio" name="opt" value="A"> <span id="op1"></span></label>

<label><input type="radio" name="opt" value="B"> <span id="op2"></span></label>

<label><input type="radio" name="opt" value="C"> <span id="op3"></span></label>

<label><input type="radio" name="opt" value="D"> <span id="op4"></span></label>

</div>

</div>

<div class="nav">

<button onclick="prevQ()">Previous</button>

<button onclick="nextQ()">Next</button>

<button onclick="submitTest()">Submit Test</button>

</div>

</div>

<script src="js/test.js"></script>
<script src="js/timer.js"></script>
<script src="js/security.js"></script>
<script src="js/submit.js"></script>

</body>
</html>
