<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nursing Solution Online Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .option { padding: 10px; border: 1px solid #ccc; margin: 5px 0; cursor: pointer; border-radius: 4px; }
        .option:hover { background: #e0e0e0; }
        #timer { font-weight: bold; color: red; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer">10:00</div>
    <h3 id="question-text">Loading...</h3>
    <div id="options-container"></div>
</div>

<script>
    // आपका अपडेटेड Web App URL
    const url = "https://script.google.com/macros/s/AKfycbyEZVkrdpMIFwbKwB3DwAyzXDuQ-dUoEOgmLRQMOCVQuGihiAi3cUG77dyXnoXuR9Ax/exec";
    
    let score = 0;
    let currentQ = 0;
    let timeLeft = 600;
    let questions = [];

    // सर्वर से प्रश्न लोड करें
    async function fetchQuestions() {
        try {
            const response = await fetch(url + "?action=getQuestions");
            questions = await response.json();
            loadQuestion();
        } catch(e) { alert("प्रश्न लोड करने में त्रुटि"); }
    }

    const timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById("timer").innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft <= 0) { clearInterval(timerInterval); submitData(); }
    }, 1000);

    function loadQuestion() {
        if(currentQ >= questions.length) { submitData(); return; }
        document.getElementById("question-text").innerText = questions[currentQ].q;
        let optDiv = document.getElementById("options-container");
        optDiv.innerHTML = "";
        questions[currentQ].options.forEach((opt, index) => {
            let div = document.createElement("div");
            div.className = "option";
            div.innerText = opt;
            div.onclick = () => {
                if(index === parseInt(questions[currentQ].correct)) score++;
                currentQ++;
                loadQuestion();
            };
            optDiv.appendChild(div);
        });
    }

    function submitData() {
        fetch(url, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "saveResult",
                name: localStorage.getItem("name") || "Guest",
                father: localStorage.getItem("father") || "N/A",
                score: score,
                total: questions.length,
                time: new Date().toLocaleString()
            })
        }).then(() => {
            alert("टेस्ट सबमिट हो गया!");
            window.location.href = "index.html";
        });
    }

    fetchQuestions();
</script>
</body>
</html>
